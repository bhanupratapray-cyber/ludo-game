<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Remote</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 300px; }
        button { padding: 20px; font-size: 24px; font-weight: bold; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:active { background: #555; transform: scale(0.95); }
        .random-btn { grid-column: 1 / 3; background: #ff4d4d; }
        #status { margin-top: 20px; color: #4dff4d; font-size: 18px; }
    </style>
</head>
<body>

    <h2>Master Remote</h2>
    <div class="grid">
        <button onclick="sendRiggedRoll(1)">1</button>
        <button onclick="sendRiggedRoll(2)">2</button>
        <button onclick="sendRiggedRoll(3)">3</button>
        <button onclick="sendRiggedRoll(4)">4</button>
        <button onclick="sendRiggedRoll(5)">5</button>
        <button onclick="sendRiggedRoll(6)">6</button>
        <button class="random-btn" onclick="sendRiggedRoll('random')">Set to Random</button>
    </div>
    <div id="status">Status: Connecting...</div>

<script>
    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA4_U6rYuOD7l0jmAPoGNdVp5W3pEitaHQ",
        authDomain: "ludo-prank-433ae.firebaseapp.com",
        projectId: "ludo-prank-433ae",
        storageBucket: "ludo-prank-433ae.firebasestorage.app",
        messagingSenderId: "435400145400",
        appId: "1:435400145400:web:7d2ce57b9de74c06d87e0d",
        databaseURL: "https://ludo-prank-433ae-default-rtdb.firebaseio.com"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendRiggedRoll(number) {
        database.ref('prank/next_roll').set(number).then(() => {
            document.getElementById('status').innerText = `Status: Trap set to ${number}!`;
        });
    }

    // Listen to see if the game has cleared the trap
    database.ref('prank/next_roll').on('value', (snapshot) => {
        if(snapshot.val() === 'random') {
            document.getElementById('status').innerText = `Status: Dice is currently Random`;
        }
    });
</script>
</body>
</html>
